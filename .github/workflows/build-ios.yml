name: Build iOS

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode (release/debug/profile)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
          - profile

env:
  FLUTTER_VERSION: '2.10.5'

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-13  # Intel architecture runner for Flutter 2.10.5 compatibility
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Verify Flutter Installation
        run: |
          flutter --version
          flutter doctor -v

      - name: Install Dependencies
        run: flutter pub get

      - name: Install CocoaPods Dependencies
        working-directory: ios
        run: |
          pod install

      # iOS Code Signing Configuration
      # You need to configure these secrets in your GitHub repository settings
      # - IOS_CERTIFICATE: Base64 encoded .p12 certificate
      # - IOS_CERTIFICATE_PASSWORD: Password for the .p12 certificate
      # - IOS_PROVISIONING_PROFILE: Base64 encoded provisioning profile
      # - KEYCHAIN_PASSWORD: Password for temporary keychain

      - name: Install Apple Certificate
        if: ${{ env.IOS_CERTIFICATE != '' }}
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$IOS_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        if: ${{ env.IOS_PROVISIONING_PROFILE != '' }}
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          PROFILE_PATH=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILE_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE" | base64 --decode -o "$PROFILE_PATH/profile.mobileprovision"

      - name: Build iOS (No Codesign)
        if: ${{ env.IOS_CERTIFICATE == '' }}
        run: |
          flutter build ios --${{ github.event.inputs.build_mode || 'release' }} --no-codesign

      - name: Build iOS (With Codesign)
        if: ${{ env.IOS_CERTIFICATE != '' }}
        run: |
          flutter build ios --${{ github.event.inputs.build_mode || 'release' }}

      - name: Archive iOS App
        if: ${{ env.IOS_CERTIFICATE != '' }}
        working-directory: build/ios/iphoneos
        run: |
          # Create IPA
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../ios_build.ipa Payload

      - name: Upload IPA Artifact
        if: ${{ env.IOS_CERTIFICATE != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.event.inputs.build_mode || 'release' }}
          path: build/ios_build.ipa
          retention-days: 30

      - name: Upload App Bundle (No Codesign)
        if: ${{ env.IOS_CERTIFICATE == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ github.event.inputs.build_mode || 'release' }}
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

      - name: Clean up Keychain
        if: ${{ always() && env.IOS_CERTIFICATE != '' }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
