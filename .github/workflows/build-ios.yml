name: Build iOS

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode (release/debug/profile)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
          - profile

env:
  FLUTTER_VERSION: '3.24.0'
  HAS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE != '' }}

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Verify Flutter Installation
        run: |
          flutter --version
          flutter doctor -v

      - name: Install Dependencies
        run: flutter pub get

      - name: Install CocoaPods Dependencies
        working-directory: ios
        run: |
          pod install

      # iOS Code Signing Configuration
      # You need to configure these secrets in your GitHub repository settings
      # - IOS_CERTIFICATE: Base64 encoded .p12 certificate
      # - IOS_CERTIFICATE_PASSWORD: Password for the .p12 certificate
      # - IOS_PROVISIONING_PROFILE: Base64 encoded provisioning profile
      # - KEYCHAIN_PASSWORD: Password for temporary keychain

      - name: Install Apple Certificate
        if: ${{ env.HAS_CERTIFICATE == 'true' }}
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$IOS_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        if: ${{ env.HAS_CERTIFICATE == 'true' }}
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          PROFILE_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILE_DIR"

          # Decode profile to temp file
          TEMP_PROFILE=$(mktemp)
          echo -n "$IOS_PROVISIONING_PROFILE" | base64 --decode > "$TEMP_PROFILE"

          # Extract UUID (Xcode requires filename to be UUID)
          PROFILE_UUID=$(security cms -D -i "$TEMP_PROFILE" | plutil -extract UUID raw -)
          echo "Profile UUID: $PROFILE_UUID"

          # Install with UUID as filename
          mv "$TEMP_PROFILE" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"

          # Verify installation
          echo ""
          echo "Installed provisioning profiles:"
          ls -la "$PROFILE_DIR"

          echo ""
          echo "Profile Bundle ID:"
          security cms -D -i "$PROFILE_DIR/$PROFILE_UUID.mobileprovision" | plutil -extract Entitlements.application-identifier raw - || true

          echo ""
          echo "Profile Type:"
          security cms -D -i "$PROFILE_DIR/$PROFILE_UUID.mobileprovision" | plutil -extract Platform raw - || true

      - name: Create Export Options
        if: ${{ env.HAS_CERTIFICATE == 'true' }}
        run: |
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>${{ secrets.IOS_TEAM_ID || 'L2Z87M4U5Y' }}</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

          echo "Created ExportOptions.plist:"
          cat ios/ExportOptions.plist

      - name: Build iOS (No Codesign)
        if: ${{ env.HAS_CERTIFICATE != 'true' }}
        run: |
          flutter build ios --${{ github.event.inputs.build_mode || 'release' }} --no-codesign

      - name: Build iOS (With Codesign)
        if: ${{ env.HAS_CERTIFICATE == 'true' }}
        run: |
          flutter build ipa --${{ github.event.inputs.build_mode || 'release' }} --export-options-plist=ios/ExportOptions.plist

      - name: Archive iOS App
        if: ${{ env.HAS_CERTIFICATE == 'true' }}
        run: |
          # flutter build ipa already creates the IPA
          # Just rename it to match expected filename
          if [ -f build/ios/ipa/*.ipa ]; then
            mv build/ios/ipa/*.ipa build/ios_build.ipa
          fi

      - name: Upload IPA Artifact
        if: ${{ env.HAS_CERTIFICATE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.event.inputs.build_mode || 'release' }}
          path: build/ios_build.ipa
          retention-days: 30

      - name: Upload App Bundle (No Codesign)
        if: ${{ env.HAS_CERTIFICATE != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ github.event.inputs.build_mode || 'release' }}
          path: build/ios/iphoneos/Runner.app
          retention-days: 30

      - name: Clean up Keychain
        if: ${{ always() && env.HAS_CERTIFICATE == 'true' }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
